<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SymptomCheck App Icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="400" cy="80" r="80" fill="#ffffff" opacity="0.06"/>
  <circle cx="100" cy="420" r="60" fill="#ffffff" opacity="0.05"/>

  <!-- Shield shape -->
  <path d="M256 96c56 0 104 12 136 28v144c0 72-56 132-136 164-80-32-136-92-136-164V124c32-16 80-28 136-28z"
        fill="url(#shield)" filter="url(#shadow)"/>

  <!-- Heartbeat / pulse line inside shield -->
  <polyline points="160,272 200,272 220,232 244,312 268,232 288,272 320,272"
            fill="none" stroke="url(#pulse)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small cross top of shield -->
  <g transform="translate(256, 176)">
    <rect x="-10" y="-26" width="20" height="52" rx="6" fill="#6366f1"/>
    <rect x="-26" y="-10" width="52" height="20" rx="6" fill="#6366f1"/>
  </g>

  <!-- Green status badge -->
  <circle cx="380" cy="380" r="44" fill="#10b981"/>
  <circle cx="380" cy="380" r="38" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3"/>
  <path d="M360,380 l13,13 l27,-27" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
